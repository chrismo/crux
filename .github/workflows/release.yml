# Cuts a release on a version tag: GoReleaser builds the archives, publishes a
# GitHub Release, and updates the Homebrew tap cask. (CI itself runs on RWX;
# only the release runs here, per the chosen setup.)
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release on this repo

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Publishes the Release on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with push access to chrismo/homebrew-crux (repo secret to add).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
